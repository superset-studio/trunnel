name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kapstan
          POSTGRES_PASSWORD: kapstan
          POSTGRES_DB: kapstan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kapstan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: api/go.sum

      - name: Install dependencies
        run: cd api && go mod download

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api

      - name: Run tests
        env:
          DATABASE_URL: postgres://kapstan:kapstan@localhost:5432/kapstan_test?sslmode=disable
          KAPSTAN_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: cd api && go test ./...

      - name: Build
        run: cd api && go build -o ../bin/kapstan ./cmd/kapstan

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

      - name: Build
        run: cd web && npm run build
