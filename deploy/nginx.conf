server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    # In production, configure the upstream address via environment or orchestration
    # location /api/ {
    #     proxy_pass http://kapstan-api:8080;
    # }
    # location /healthz {
    #     proxy_pass http://kapstan-api:8080;
    # }
    # location /readyz {
    #     proxy_pass http://kapstan-api:8080;
    # }
}
